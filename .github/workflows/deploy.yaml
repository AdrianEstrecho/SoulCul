name: Build and Deploy Frontend

on:
  push:
    branches:
      - main
      - backend
    paths:
      - src/**
      - public/**
      - index.html
      - package.json
      - package-lock.json
      - vite.config.js
      - .github/workflows/deploy.yaml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Publish dist/ to build branch
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: build
          FOLDER: dist
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
