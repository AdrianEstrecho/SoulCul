name: Deploy dist to build branch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy dist to build branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: build
          force_orphan: false

      - name: Trigger Hostinger frontend deploy webhook
        env:
          HOSTINGER_BUILD_WEBHOOK_URL: ${{ secrets.HOSTINGER_BUILD_WEBHOOK_URL }}
        run: |
          if [ -z "$HOSTINGER_BUILD_WEBHOOK_URL" ]; then
            echo "No webhook URL set, skipping"
            exit 0
          fi
          curl --fail --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --header "X-GitHub-Event: push" \
            --header "User-Agent: GitHub-Hookshot" \
            --data '{"ref": "refs/heads/build"}' \
            "$HOSTINGER_BUILD_WEBHOOK_URL"